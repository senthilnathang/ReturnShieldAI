services:
  postgres:
    image: postgres:15-alpine
    container_name: returnshield-postgres
    restart: unless-stopped
    ports:
      - "55433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-returnshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-returnshield_secret}
      POSTGRES_DB: ${POSTGRES_DB:-returnshield}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U returnshield"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c maintenance_work_mem=512MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c default_statistics_target=500
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=64MB
      -c min_wal_size=2GB
      -c max_wal_size=8GB
      -c max_worker_processes=8
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8

  redis:
    image: redis:7-alpine
    container_name: returnshield-redis
    restart: unless-stopped
    ports:
      - "56380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: returnshield-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://returnshield:returnshield_secret@postgres:5432/returnshield
      DATABASE_URL_SYNC: postgresql://returnshield:returnshield_secret@postgres:5432/returnshield
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      LOG_LEVEL: INFO
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
    volumes:
      - ./data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.prod_main:app --host 0.0.0.0 --port 8000 --workers 4
      "

volumes:
  postgres_data:
  redis_data:
