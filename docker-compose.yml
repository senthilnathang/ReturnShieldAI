services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: returnshield
      POSTGRES_USER: returns
      POSTGRES_PASSWORD: returns
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://returns:returns@postgres:5432/returnshield
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
